name: Validate Metro Snapshot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - name: Checkout metro-snapshot branch if it exists
        run: |
          if git ls-remote --heads origin metro-snapshot | grep -q metro-snapshot; then
            git fetch origin metro-snapshot
            git checkout metro-snapshot
          fi

      - name: Fetch latest Metro snapshot version
        id: snapshot
        run: |
          SNAPSHOT_VERSION=$(curl -s https://central.sonatype.com/repository/maven-snapshots/dev/zacsweers/metro/runtime/maven-metadata.xml | grep '<latest>' | sed 's/.*<latest>\(.*\)<\/latest>.*/\1/')
          echo "version=$SNAPSHOT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Replace metro version with snapshot
        run: |
          sed -i '' "s/^metro = \".*\"/metro = \"${{ steps.snapshot.outputs.version }}\"/" gradle/libs.versions.toml
          sed -i '' "s/^metro = \".*\"/metro = \"${{ steps.snapshot.outputs.version }}\"/" sample/gradle/libs.versions.toml

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Write Artifactory credentials to local.properties
        run: |
          echo "ARTIFACTORY_URL=${{ secrets.ARTIFACTORY_URL }}" >> local.properties
          echo "ARTIFACTORY_USERNAME=${{ secrets.ARTIFACTORY_USERNAME }}" >> local.properties
          echo "ARTIFACTORY_PASSWORD=${{ secrets.ARTIFACTORY_PASSWORD }}" >> local.properties

      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew build --continue -PexcludeDumpTests

      - name: Assemble sample app
        run: ./gradlew :app:assembleDebug
        working-directory: sample

      - uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
