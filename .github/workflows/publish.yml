name: Publish

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Write Artifactory credentials to local.properties
        run: |
          echo "ARTIFACTORY_URL=${{ secrets.ARTIFACTORY_URL }}" >> local.properties
          echo "ARTIFACTORY_USERNAME=${{ secrets.ARTIFACTORY_USERNAME }}" >> local.properties
          echo "ARTIFACTORY_PASSWORD=${{ secrets.ARTIFACTORY_PASSWORD }}" >> local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish
        run: ./gradlew publishAllPublicationsToBandLabRepository
        env:
          ORG_GRADLE_PROJECT_BandLabUsername: ${{ secrets.PUBLISHER_USERNAME }}
          ORG_GRADLE_PROJECT_BandLabPassword: ${{ secrets.PUBLISHER_PASSWORD }}
